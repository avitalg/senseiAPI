[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI uses these as default-arg markers; they are safe to call in defaults.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Form",
    "fastapi.File",
]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
ignore_missing_imports = true

# numpy (a faster-whisper dependency) ships stubs written with the 3.12+ `type`
# statement. Parsing them under our 3.11 floor is a syntax error that aborts the
# whole run, so skip them — we never annotate against numpy ourselves.
[[tool.mypy.overrides]]
module = "numpy.*"
follow_imports = "skip"
follow_imports_for_stubs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-m 'not manual'"
markers = [
    "integration: tests that require Docker or local services",
    "manual: tests that call paid external services and must be selected explicitly",
]
