services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: senseiapi
      POSTGRES_USER: sensei
      POSTGRES_PASSWORD: sensei
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensei -d senseiapi"]
      interval: 5s
      timeout: 5s
      retries: 5
