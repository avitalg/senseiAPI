services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: senseiapi
      POSTGRES_USER: sensei
      POSTGRES_PASSWORD: sensei
    ports:
      - "5433:5432"
    volumes:
      - ./.docker/postgres_data:/var/lib/postgresql/data
      # Runs only on first init (empty data dir): loads seed patients + sessions.
      - ./.docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensei -d senseiapi"]
      interval: 5s
      timeout: 5s
      retries: 5
