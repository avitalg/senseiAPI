# CI / release gate. Runs on every push to main and every PR.
# Fails on: lint errors, format drift, type errors, or any test regression
# (unit + Testcontainers integration). Treat this check as required before
# merging or deploying — enable it as a required status check on main.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# One run per ref: a new push supersedes older in-progress runs on the same PR/branch.
# main is never cancelled — every landed commit gets a full gate.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Format
        run: .venv/bin/ruff format --check .

      - name: Typecheck
        run: .venv/bin/mypy .

      - name: Unit tests
        run: .venv/bin/python -m pytest -m "not integration"

      # Testcontainers needs the host Docker daemon (preinstalled on ubuntu-latest).
      # Exclude @pytest.mark.manual (paid live APIs like ElevenLabs TTS example).
      - name: Integration tests
        run: .venv/bin/python -m pytest -m "integration and not manual"
